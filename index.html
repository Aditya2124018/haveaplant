<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haveaplant - Coming Soon</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2e7d32;
    }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 600px;
    }

    .logo {
      font-size: 48px;
      font-weight: 600;
      color: #1b5e20;
    }

    .tagline {
      font-size: 18px;
      margin-top: 10px;
      color: #388e3c;
      letter-spacing: 1px;
    }

    .plant-img {
      margin: 40px 0;
    }

    .plant-img img {
      width: 180px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .headline {
      font-size: 24px;
      margin-bottom: 15px;
      color: #1b5e20;
    }

    .subtext {
      font-size: 16px;
      color: #4caf50;
      margin-bottom: 30px;
    }

    .coming-soon {
      display: inline-block;
      padding: 12px 25px;
      border-radius: 30px;
      background: #2e7d32;
      color: #fff;
      font-weight: 500;
      letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #66bb6a;
    }

  </style>
</head>
<body>

  <div class="container">
    
    <div class="logo">Haveaplant</div>
    <div class="tagline">Yahi to saath Jayega 🌿</div>

    <div class="plant-img">
      <img src="plant2.png" alt="Plant">
    </div>

    <div class="headline">
      Grow Memories, Not Just Plants 🌱
    </div>

    <div class="subtext">
      A small plant today, a lifetime of connection tomorrow.
    </div>

    <div class="coming-soon">
      Coming Soon
    </div>

    <div class="footer">
      Stay rooted. Something beautiful is growing.
    </div>

  </div>

</body>
</html>
